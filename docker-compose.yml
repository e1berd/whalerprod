name: whaler

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgres://postgres:postgres@host.docker.internal:54322/postgres}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL_DOCKER:-http://host.docker.internal:54321}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:5173}
      RUNNER_INTERNAL_URL: ${RUNNER_INTERNAL_URL_DOCKER:-http://runner:3002}
      RUNNER_INTERNAL_TOKEN: ${RUNNER_INTERNAL_TOKEN}
      STAND_BASE_DOMAIN: ${STAND_BASE_DOMAIN_DOCKER:-stand.whaler.ru}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - runner
    restart: unless-stopped

  collab:
    build:
      context: .
      dockerfile: apps/collab/Dockerfile
    environment:
      NODE_ENV: production
      COLLAB_PORT: 3001
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgres://postgres:postgres@host.docker.internal:54322/postgres}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL_DOCKER:-http://host.docker.internal:54321}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  voice:
    build:
      context: .
      dockerfile: apps/voice/Dockerfile
    environment:
      NODE_ENV: production
      VOICE_PORT: 3003
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgres://postgres:postgres@host.docker.internal:54322/postgres}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL_DOCKER:-http://host.docker.internal:54321}
      MEDIASOUP_LISTEN_IP: 0.0.0.0
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_ANNOUNCED_IP:-127.0.0.1}
      MEDIASOUP_RTC_MIN_PORT: ${MEDIASOUP_RTC_MIN_PORT:-40000}
      MEDIASOUP_RTC_MAX_PORT: ${MEDIASOUP_RTC_MAX_PORT:-40100}
      STUN_URL: ${STUN_URL:-stun:stun.l.google.com:19302}
      TURN_URL: ${TURN_URL:-}
      TURN_STATIC_SECRET: ${TURN_STATIC_SECRET:-}
      TURN_TTL_SECONDS: ${TURN_TTL_SECONDS:-3600}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}:40000-40100/udp"
      - "${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}:40000-40100/tcp"
    restart: unless-stopped

  coturn:
    image: coturn/coturn:4.6
    profiles: ["turn"]
    network_mode: host
    entrypoint: ["turnserver"]
    command:
      - "-c"
      - "/etc/coturn/turnserver.conf"
      - "--realm=${TURN_REALM:-whaler}"
      - "--static-auth-secret=${TURN_STATIC_SECRET:?TURN_STATIC_SECRET is required when running the turn profile}"
    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped

  runner:
    build:
      context: .
      dockerfile: apps/runner/Dockerfile
    environment:
      NODE_ENV: production
      RUNNER_PORT: 3002
      RUNNER_INTERNAL_TOKEN: ${RUNNER_INTERNAL_TOKEN}
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      SANDBOX_MEMORY_BYTES: ${SANDBOX_MEMORY_BYTES:-536870912}
      SANDBOX_NANO_CPUS: ${SANDBOX_NANO_CPUS:-1000000000}
      SANDBOX_PIDS_LIMIT: ${SANDBOX_PIDS_LIMIT:-256}
      PREVIEW_NETWORK_NAME: ${PREVIEW_NETWORK_NAME:-whaler-preview}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - default
      - preview
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_COLLAB_URL: ${VITE_COLLAB_URL:-ws://localhost:3001}
        VITE_VOICE_URL: ${VITE_VOICE_URL:-ws://localhost:3003}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://127.0.0.1:54321}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      API_DOMAIN: ${API_DOMAIN:-api.localhost}
      COLLAB_DOMAIN: ${COLLAB_DOMAIN:-collab.localhost}
      VOICE_DOMAIN: ${VOICE_DOMAIN:-voice.localhost}
      STAND_BASE_DOMAIN: ${STAND_BASE_DOMAIN_DOCKER:-stand.whaler.ru}
      SUPABASE_DOMAIN: ${SUPABASE_DOMAIN:-supabase.localhost}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-admin@example.com}
      SUPABASE_UPSTREAM: ${SUPABASE_UPSTREAM:-host.docker.internal:54321}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - collab
      - voice
      - runner
      - web
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:

networks:
  preview:
    name: ${PREVIEW_NETWORK_NAME:-whaler-preview}
