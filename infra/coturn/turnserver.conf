# coturn configuration for WhalerProd voice (mediasoup) clients.
# Auth uses time-limited REST credentials shared with the voice server via TURN_STATIC_SECRET.

listening-port=3478

fingerprint
use-auth-secret

# static-auth-secret, realm, and external-ip are injected from env at container start.
# (see docker-compose.yml command:)

no-cli
no-multicast-peers
no-tlsv1
no-tlsv1_1

# Relay port range — must be exposed in docker-compose.
min-port=49160
max-port=49200

# Stream logs to stdout so `docker compose logs coturn` shows them.
log-file=stdout
simple-log
